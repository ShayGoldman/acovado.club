name: acovado-infra

x-acovado-logging: &acovado-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "10"

services:
  postgres:
    extends:
      file: ../../infra/postgres/docker-compose.base.yaml
      service: postgres
    env_file:
      - ${ENV_FILES_ROOT}/postgres.env
    environment:
      POSTGRES_DB: production
    volumes:
      - ${VOLUMES_ROOT}/postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal-network
    deploy:
      resources:
        limits:
          cpus: 2
          memory: "4gb"
    logging: *acovado-logging

  # TODO Drizzle studio maybe?

  rabbitmq:
    extends:
      file: ../../infra/rabbitmq/docker-compose.base.yaml
      service: rabbitmq
    env_file:
      - ${ENV_FILES_ROOT}/rabbitmq.env
    networks:
      - internal-network
      - proxy-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rabbitmq.rule=Host(`rabbitmq.acovado.club`)"
      - "traefik.http.routers.rabbitmq.entrypoints=websecure"
      - "traefik.http.routers.rabbitmq.tls.certresolver=acovado"
      - "traefik.http.services.rabbitmq.loadbalancer.server.port=15672"
      - "traefik.http.routers.rabbitmq.middlewares=auth"
      - "traefik.docker.network=proxy-network"
    deploy:
      resources:
        limits:
          cpus: 2
          memory: "4gb"
    logging: *acovado-logging

  zookeeper:
    extends:
      file: ../../infra/observability/docker-compose.base.yaml
      service: zookeeper
    volumes:
      - ${VOLUMES_ROOT}/signoz-zookeeper:/bitnami/zookeeper
    networks:
      internal-network:
        aliases:
          - zookeeper-1
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512mb"

  clickhouse:
    extends:
      file: ../../infra/observability/docker-compose.base.yaml
      service: clickhouse
    volumes:
      - ${CONFIG_FILES_ROOT}/infra/observability/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ${CONFIG_FILES_ROOT}/infra/observability/clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ${CONFIG_FILES_ROOT}/infra/observability/clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ${CONFIG_FILES_ROOT}/infra/observability/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - ${VOLUMES_ROOT}/signoz-clickhouse:/var/lib/clickhouse/
    networks:
      - internal-network
    depends_on:
      zookeeper:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: 2
          memory: "4gb"

  signoz-telemetrystore-migrator:
    extends:
      file: ../../infra/observability/docker-compose.base.yaml
      service: signoz-telemetrystore-migrator
    networks:
      - internal-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512mb"

  signoz:
    extends:
      file: ../../infra/observability/docker-compose.base.yaml
      service: signoz
    volumes:
      - ${CONFIG_FILES_ROOT}/infra/observability/signoz/prometheus.yml:/root/config/prometheus.yml
      - ${VOLUMES_ROOT}/signoz-sqlite:/var/lib/signoz/
    ports: []
    networks:
      - proxy-network
      - internal-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.signoz.rule=Host(`signoz.acovado.club`)"
      - "traefik.http.routers.signoz.entrypoints=websecure"
      - "traefik.http.routers.signoz.tls.certresolver=acovado"
      - "traefik.http.services.signoz.loadbalancer.server.port=8080"
      - "traefik.http.routers.signoz.middlewares=auth"
      - "traefik.docker.network=proxy-network"
    deploy:
      resources:
        limits:
          cpus: 1
          memory: "2gb"

  otel-collector:
    extends:
      file: ../../infra/observability/docker-compose.base.yaml
      service: otel-collector
    volumes:
      - ${CONFIG_FILES_ROOT}/infra/observability/otel-collector-signoz-config.yaml:/etc/otel-collector-config.yaml
      - ${CONFIG_FILES_ROOT}/infra/observability/signoz/otel-collector-opamp-config.yaml:/etc/manager-config.yaml
    ports: []
    networks:
      - internal-network
    deploy:
      resources:
        limits:
          cpus: 1
          memory: "2gb"

  stats:
    image: portainer/portainer-ce:2.25.1-alpine
    container_name: stats
    ports: []
    networks:
      - proxy-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/volumes/stats:/data
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stats.rule=Host(`stats.acovado.club`)"
      - "traefik.http.routers.stats.entrypoints=websecure"
      - "traefik.http.routers.stats.tls.certresolver=acovado"
      - "traefik.http.services.stats.loadbalancer.server.port=9000"
      - "traefik.http.routers.stats.middlewares=auth"
      - "traefik.docker.network=proxy-network"
    deploy:
      resources:
        limits:
          cpus: 1
          memory: "2gb"
    logging: *acovado-logging

  falkordb:
    extends:
      file: ../../infra/falkordb/docker-compose.base.yaml
      service: falkordb
    env_file:
      - ${ENV_FILES_ROOT}/falkordb.env
    environment:
      FALKORDB_ARGS: THREAD_COUNT 8
    volumes:
      - ${VOLUMES_ROOT}/falkordb-data:/data
    restart: unless-stopped
    networks:
      - internal-network
    deploy:
      resources:
        limits:
          cpus: 1
          memory: "2gb"
    logging: *acovado-logging

  inference-model:
    extends:
      file: ../../infra/inference-model/docker-compose.base.yaml
      service: inference-model
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ${VOLUMES_ROOT}/inference-model-data:/root/.ollama
    restart: unless-stopped
    networks:
      - internal-network
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 10
        ollama run gemma4:e4b || echo "Model pull failed or already exists"
        wait
    deploy:
      resources:
        limits:
          cpus: 2
          memory: "8gb"
    logging: *acovado-logging

networks:
  proxy-network:
    external: true
  internal-network:
    external: true
