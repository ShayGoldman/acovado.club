name: acovado-apps

x-acovado-logging: &acovado-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "3"

services:
  signal-processor:
    container_name: signal-processor
    image: ${REGISTRY_URL}/signal-processor:${COMMIT_HASH}
    env_file:
      - ${ENV_FILES_ROOT}/signal-processor.env
    environment:
      NODE_ENV: production
      TRACE_EXPORTER_URLS: http://otel-collector:4318/v1/traces
    restart: unless-stopped
    networks:
      - internal-network
    deploy:
      resources:
        limits:
          cpus: 1
          memory: '512mb'
    logging: *acovado-logging

  youtube-worker:
    container_name: youtube-worker
    image: ${REGISTRY_URL}/youtube-worker:${COMMIT_HASH}
    env_file:
      - ${ENV_FILES_ROOT}/youtube-worker.env
    environment:
      NODE_ENV: production
      TRACE_EXPORTER_URLS: http://otel-collector:4318/v1/traces
    restart: unless-stopped
    networks:
      - internal-network
    deploy:
      resources:
        limits:
          cpus: 1
          memory: '512mb'
    logging: *acovado-logging

  reddit-worker:
    container_name: reddit-worker
    image: ${REGISTRY_URL}/reddit-worker:${COMMIT_HASH}
    env_file:
      - ${ENV_FILES_ROOT}/reddit-worker.env
    environment:
      NODE_ENV: production
      TRACE_EXPORTER_URLS: http://otel-collector:4318/v1/traces
    restart: unless-stopped
    networks:
      - internal-network
    deploy:
      resources:
        limits:
          cpus: 1
          memory: '512mb'
    logging: *acovado-logging

  news-worker:
    container_name: news-worker
    image: ${REGISTRY_URL}/news-worker:${COMMIT_HASH}
    env_file:
      - ${ENV_FILES_ROOT}/news-worker.env
    environment:
      NODE_ENV: production
      TRACE_EXPORTER_URLS: http://otel-collector:4318/v1/traces
    restart: unless-stopped
    networks:
      - internal-network
    deploy:
      resources:
        limits:
          cpus: 1
          # 1024mb (double the other workers) — a live Chromium process sits in RSS.
          # Tune down in M5 hardening if V3 shows comfortable headroom.
          memory: '1024mb'
    logging: *acovado-logging

  dashboard:
    container_name: dashboard
    image: ${REGISTRY_URL}/dashboard:${COMMIT_HASH}
    env_file:
      - ${ENV_FILES_ROOT}/dashboard.env
    environment:
      NODE_ENV: production
      TRACE_EXPORTER_URLS: http://otel-collector:4318/v1/traces
    restart: unless-stopped
    networks:
      - internal-network
      - proxy-network
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.dashboard.rule=Host(`dashboard.acovado.club`)'
      - 'traefik.http.routers.dashboard.entrypoints=websecure'
      - 'traefik.http.routers.dashboard.tls.certresolver=acovado'
      - 'traefik.http.services.dashboard.loadbalancer.server.port=3000'
      - 'traefik.http.routers.dashboard.middlewares=auth'
      - 'traefik.http.routers.dashboard-health.rule=Host(`dashboard.acovado.club`) && Path(`/health`)'
      - 'traefik.http.routers.dashboard-health.entrypoints=websecure'
      - 'traefik.http.routers.dashboard-health.tls.certresolver=acovado'
      - 'traefik.http.routers.dashboard-health.service=dashboard'
      - 'traefik.http.routers.dashboard-health.priority=100'
      - 'traefik.docker.network=proxy-network'
    deploy:
      resources:
        limits:
          cpus: 1
          memory: '512mb'
    logging: *acovado-logging

networks:
  internal-network:
    external: true
  proxy-network:
    external: true
