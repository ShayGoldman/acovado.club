name: acovado-apps

# TRACE_EXPORTER_URLS is read from each env_file (same value locally and on the VPS): see app .env templates.

x-acovado-logging: &acovado-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "10"

services:
  bebe:
    container_name: bebe
    image: ${REGISTRY_URL}/bebe:${COMMIT_HASH}
    env_file:
      - ${ENV_FILES_ROOT}/bebe.env
    environment:
      NODE_ENV: production
      CRONS_START_ON_INIT: false
    restart: unless-stopped
    networks:
      - internal-network
    deploy:
      resources:
        limits:
          cpus: 1
          memory: "1gb"
    logging: *acovado-logging

  collection:
    container_name: collection
    image: ${REGISTRY_URL}/collection:${COMMIT_HASH}
    env_file:
      - ${ENV_FILES_ROOT}/collection.env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - internal-network
    deploy:
      resources:
        limits:
          cpus: 1
          memory: "1gb"
    logging: *acovado-logging

  ana-liese:
    container_name: ana-liese
    image: ${REGISTRY_URL}/ana-liese:${COMMIT_HASH}
    env_file:
      - ${ENV_FILES_ROOT}/ana-liese.env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - internal-network
    deploy:
      resources:
        limits:
          cpus: 2
          memory: "2gb"
    logging: *acovado-logging

networks:
  internal-network:
    external: true
