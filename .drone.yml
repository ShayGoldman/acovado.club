kind: pipeline
type: docker
name: acovado

environment:
  REGISTRY_URL: docker-registry.acovado.club
  EXAMPLE_IMAGE: docker-registry.acovado.club/example
  SIGNAL_PROCESSOR_IMAGE: docker-registry.acovado.club/signal-processor
  YOUTUBE_WORKER_IMAGE: docker-registry.acovado.club/youtube-worker
  REDDIT_WORKER_IMAGE: docker-registry.acovado.club/reddit-worker
  DASHBOARD_IMAGE: docker-registry.acovado.club/dashboard

volumes:
  - name: docker-socket
    host:
      path: /var/run/docker.sock
  - name: docker-cache
    host:
      path: /var/lib/docker
  - name: volumes-root
    host:
      path: /srv/volumes
  - name: env-files-root
    host:
      path: /srv/env

steps:
  ##############################################################################
  # Step 0: Guard against non-merge commits (with escape hatch)
  ##############################################################################
  - name: validate-merge-commit
    image: node:20-bullseye
    commands:
      - |
        MSG="$(git log -1 --pretty=%B)"
        if echo "$MSG" | grep -q "Merge pull request"; then
          echo "Merge commit detected — continuing pipeline."
          exit 0
        fi
        if echo "$MSG" | grep -qF "[trigger-main-deploy]"; then
          echo "Escape hatch [trigger-main-deploy] — continuing pipeline without a PR merge commit."
          exit 0
        fi
        echo "Not a merge commit and no [trigger-main-deploy] tag. Skipping pipeline."
        exit 78

  ##############################################################################
  # Step 1: Pre-build
  ##############################################################################
  - name: pre-build
    image: bash
    commands:
      - echo "Preparing to build images..."
    depends_on:
      - validate-merge-commit

  ##############################################################################
  # Step 2: Build and push all pipeline app images (parallel)
  ##############################################################################
  - name: build-example
    image: docker
    environment:
      DOCKER_BUILDKIT: 1
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
      - name: docker-cache
        path: /var/lib/docker
    commands:
      - docker build --target production --build-arg APP_PATH=example -t $${EXAMPLE_IMAGE}:${DRONE_COMMIT_SHA} .
      - docker tag $${EXAMPLE_IMAGE}:${DRONE_COMMIT_SHA} $${EXAMPLE_IMAGE}:latest
      - docker push $${EXAMPLE_IMAGE}:${DRONE_COMMIT_SHA}
      - docker push $${EXAMPLE_IMAGE}:latest
    depends_on:
      - pre-build

  - name: build-signal-processor
    image: docker
    environment:
      DOCKER_BUILDKIT: 1
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
      - name: docker-cache
        path: /var/lib/docker
    commands:
      - docker build --target production --build-arg APP_PATH=signal-processor -t $${SIGNAL_PROCESSOR_IMAGE}:${DRONE_COMMIT_SHA} .
      - docker tag $${SIGNAL_PROCESSOR_IMAGE}:${DRONE_COMMIT_SHA} $${SIGNAL_PROCESSOR_IMAGE}:latest
      - docker push $${SIGNAL_PROCESSOR_IMAGE}:${DRONE_COMMIT_SHA}
      - docker push $${SIGNAL_PROCESSOR_IMAGE}:latest
    depends_on:
      - pre-build

  - name: build-youtube-worker
    image: docker
    environment:
      DOCKER_BUILDKIT: 1
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
      - name: docker-cache
        path: /var/lib/docker
    commands:
      - docker build --target production --build-arg APP_PATH=youtube-worker -t $${YOUTUBE_WORKER_IMAGE}:${DRONE_COMMIT_SHA} .
      - docker tag $${YOUTUBE_WORKER_IMAGE}:${DRONE_COMMIT_SHA} $${YOUTUBE_WORKER_IMAGE}:latest
      - docker push $${YOUTUBE_WORKER_IMAGE}:${DRONE_COMMIT_SHA}
      - docker push $${YOUTUBE_WORKER_IMAGE}:latest
    depends_on:
      - pre-build

  - name: build-reddit-worker
    image: docker
    environment:
      DOCKER_BUILDKIT: 1
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
      - name: docker-cache
        path: /var/lib/docker
    commands:
      - docker build --target production --build-arg APP_PATH=reddit-worker -t $${REDDIT_WORKER_IMAGE}:${DRONE_COMMIT_SHA} .
      - docker tag $${REDDIT_WORKER_IMAGE}:${DRONE_COMMIT_SHA} $${REDDIT_WORKER_IMAGE}:latest
      - docker push $${REDDIT_WORKER_IMAGE}:${DRONE_COMMIT_SHA}
      - docker push $${REDDIT_WORKER_IMAGE}:latest
    depends_on:
      - pre-build

  - name: build-dashboard
    image: docker
    environment:
      DOCKER_BUILDKIT: 1
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
      - name: docker-cache
        path: /var/lib/docker
    commands:
      - docker build --target production --build-arg APP_PATH=dashboard -t $${DASHBOARD_IMAGE}:${DRONE_COMMIT_SHA} .
      - docker tag $${DASHBOARD_IMAGE}:${DRONE_COMMIT_SHA} $${DASHBOARD_IMAGE}:latest
      - docker push $${DASHBOARD_IMAGE}:${DRONE_COMMIT_SHA}
      - docker push $${DASHBOARD_IMAGE}:latest
    depends_on:
      - pre-build

  ##############################################################################
  # Step 3: Post build
  ##############################################################################
  - name: post-build
    image: bash
    commands:
      - echo "Build complete"
      - echo "(example) $${EXAMPLE_IMAGE}:${DRONE_COMMIT_SHA}"
      - echo "(signal-processor) $${SIGNAL_PROCESSOR_IMAGE}:${DRONE_COMMIT_SHA}"
      - echo "(youtube-worker) $${YOUTUBE_WORKER_IMAGE}:${DRONE_COMMIT_SHA}"
      - echo "(reddit-worker) $${REDDIT_WORKER_IMAGE}:${DRONE_COMMIT_SHA}"
      - echo "(dashboard) $${DASHBOARD_IMAGE}:${DRONE_COMMIT_SHA}"
    depends_on:
      - build-example
      - build-signal-processor
      - build-youtube-worker
      - build-reddit-worker
      - build-dashboard

  ##############################################################################
  # Step 4: Check for and release new versions
  # TODO: Re-enable after fixing GitHub authentication (git push / gh release; token or remote URL).
  ##############################################################################
  # - name: release-versions
  #   image: node:20-bookworm
  #   environment:
  #     CI: "true"
  #     GIT_TERMINAL_PROMPT: "0"
  #     GITHUB_TOKEN:
  #       from_secret: github_token
  #     GH_TOKEN:
  #       from_secret: github_token
  #   commands:
  #     # Drone substitutes $VAR in steps; use $$ so shell gets $HOME, $PATH, $(...), loop $tag.
  #     # Drone runs commands with /bin/sh (dash); dash rejects `set -o pipefail` (bash-only).
  #     - |
  #       set -eu
  #       apt-get update && apt-get install -y --no-install-recommends git jq ca-certificates curl unzip gh
  #       curl -fsSL https://bun.sh/install -o /tmp/bun-install.sh
  #       bash /tmp/bun-install.sh
  #       export BUN_INSTALL="$${HOME}/.bun"
  #       export PATH="$${BUN_INSTALL}/bin:$${PATH}"
  #       bun --version
  #
  #       cd "${DRONE_WORKSPACE:-/drone/src}"
  #       git config --global --add safe.directory "${DRONE_WORKSPACE:-/drone/src}"
  #       git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${DRONE_REPO}.git"
  #
  #       bun install --frozen-lockfile --ignore-scripts
  #
  #       bunx changeset status --verbose --output changesets.json
  #       if jq -e '.changesets == [] and .releases == []' changesets.json > /dev/null; then
  #         echo "No pending changesets — skipping release."
  #         exit 78
  #       fi
  #
  #       bunx changeset version
  #
  #       git config user.name "Drone CI"
  #       git config user.email "ci@acovado.club"
  #       git add .
  #       git commit -m "chore: update CHANGELOG.md and version bumps [skip ci]"
  #
  #       bunx changeset tag
  #
  #       for tag in $$(git tag --points-at HEAD); do
  #         gh release create "$$tag" --title "$$tag" --notes "Automated release via Drone CI" || true
  #       done
  #
  #       git push origin main --tags
  #
  #   depends_on:
  #     - post-build

  ##############################################################################
  # Step 5: Deploy 🤙
  ##############################################################################
  - name: deploy
    image: docker
    environment:
      COMMIT_HASH: ${DRONE_COMMIT_SHA} # Pass the commit hash
      REGISTRY_URL: ${REGISTRY_URL}
      PROJECT_ROOT: /drone/src
      VOLUMES_ROOT: /srv/volumes
      CONFIG_FILES_ROOT: /srv/volumes/deployment
      ENV_FILES_ROOT: /srv/env
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
      - name: env-files-root
        path: /srv/env
      - name: volumes-root
        path: /srv/volumes
    commands:
      # Workspace must be the repo root so compose `extends:` and build contexts resolve.
      - cd "${DRONE_WORKSPACE:-/drone/src}"
      - cp -rf infra /srv/volumes/deployment

      # Deploy the new environment (Compose V2 plugin)
      - docker compose -f config/compose/docker-compose.infra.yaml -p acovado-infra up -d
      - docker compose -f config/compose/docker-compose.apps.yaml -p acovado-apps up -d --force-recreate
    depends_on:
      - post-build

  ##############################################################################
  # Step 6: Cleanup old images
  ##############################################################################
  - name: cleanup
    image: docker
    environment:
      REGISTRY_URL: ${REGISTRY_URL}
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
    commands:
      - |
        docker images --format "{{.Repository}}:{{.Tag}}" | grep "${REGISTRY_URL}" | while read image; do
          if ! docker ps --filter "ancestor=$image" --format "{{.Image}}" | grep -q "$image"; then
            docker rmi -f $image || true;
          fi;
        done
    depends_on:
      - deploy

trigger:
  branch:
    - main
  event:
    - push
