kind: pipeline
type: docker
name: acovado

environment:
  REGISTRY_URL: docker-registry.acovado.club
  MODULES_IMAGE: docker-registry.acovado.club/modules
  EXAMPLE_IMAGE: docker-registry.acovado.club/example

volumes:
  - name: docker-socket
    host:
      path: /var/run/docker.sock
  - name: docker-cache
    host:
      path: /var/lib/docker
  - name: volumes-root
    host:
      path: /srv/volumes
  - name: env-files-root
    host:
      path: /srv/env

steps:
  ##############################################################################
  # Step 0: Guard against non-merge commits
  ##############################################################################
  - name: validate-merge-commit
    image: node:20-bullseye
    commands:
      - |
        if ! git log -1 --pretty=%B | grep -q "Merge pull request"; then
          echo "Not a merge commit. Skipping pipeline."
          exit 78
        fi

  ##############################################################################
  # Step 1: Build and push shared modules
  ##############################################################################
  - name: pre-build
    image: bash
    commands:
      - echo "Preparing to build images..."
    depends_on:
      - validate-merge-commit

  ##############################################################################
  # Step 2: Build and push shared modules
  ##############################################################################
  - name: build-modules
    image: docker
    environment:
      DOCKER_BUILDKIT: 1
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
      - name: docker-cache
        path: /var/lib/docker
    commands:
      - docker build --target modules-builder -t $${MODULES_IMAGE}:${DRONE_COMMIT_SHA} .
      - docker tag $${MODULES_IMAGE}:${DRONE_COMMIT_SHA} $${MODULES_IMAGE}:latest
      - docker push $${MODULES_IMAGE}:${DRONE_COMMIT_SHA}
      - docker push $${MODULES_IMAGE}:latest
    depends_on:
      - pre-build

  ##############################################################################
  # Step 3: Build and push example app
  ##############################################################################
  - name: build-example
    image: docker
    environment:
      DOCKER_BUILDKIT: 1
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
      - name: docker-cache
        path: /var/lib/docker
    commands:
      - docker build --target production --build-arg APP_PATH=example --build-arg APP_NAME=@apps/example -t $${EXAMPLE_IMAGE}:${DRONE_COMMIT_SHA} .
      - docker tag $${EXAMPLE_IMAGE}:${DRONE_COMMIT_SHA} $${EXAMPLE_IMAGE}:latest
      - docker push $${EXAMPLE_IMAGE}:${DRONE_COMMIT_SHA}
      - docker push $${EXAMPLE_IMAGE}:latest
    depends_on:
      - build-modules

  ##############################################################################
  # Step 4: Post build
  ##############################################################################
  - name: post-build
    image: bash
    commands:
      - echo "Build complete"
      - echo "(example) $${EXAMPLE_IMAGE}:${DRONE_COMMIT_SHA}"
    depends_on:
      - build-example

  ##############################################################################
  # Step 5: Check for and release new versions
  ##############################################################################
  - name: release-versions
    image: debian:bookworm-slim
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      # Install Node.js, gh, and necessary tools
      - apt-get update
      - apt-get install -y --no-install-recommends git jq curl gh
      - curl -fsSL https://deb.nodesource.com/setup_20.x | sudo bash -
      - apt-get install -y nodejs

      # Verify installations
      - node --version
      - npm --version
      - gh --version

      # Check if there are any changesets, if no changesets then exit
      - npx changeset status --verbose --output changesets.json
      - jq -e '.changesets == [] and .releases == []' changesets.json > /dev/null && exit 78 || true

      # Apply version bumps
      - npx changeset version

      # Commit changelogs
      - git config user.name "Drone CI"
      - git config user.email "ci@acovado.club"
      - git add .
      - |
        git commit -m "chore: update CHANGELOG.md and version bumps [skip ci]"

      # Tag the new versions
      - npx changeset tag

      # Create GitHub release for the new tags
      - |
        for tag in $(git tag --points-at HEAD); do
          gh release create "$tag" --title "$tag" --notes "Automated release via Drone CI"
        done

      # Push changes
      - git push origin main --tags

    depends_on:
      - post-build

  ##############################################################################
  # Step 6: Deploy 🤙
  ##############################################################################
  - name: deploy
    image: docker
    environment:
      COMMIT_HASH: ${DRONE_COMMIT_SHA} # Pass the commit hash
      REGISTRY_URL: ${REGISTRY_URL}
      PROJECT_ROOT: /drone/src
      VOLUMES_ROOT: /srv/volumes
      CONFIG_FILES_ROOT: /srv/volumes/deployment
      ENV_FILES_ROOT: /srv/env
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
      - name: env-files-root
        path: /srv/env
      - name: volumes-root
        path: /srv/volumes
    commands:
      # Workspace must be the repo root so compose `extends:` and build contexts resolve.
      - cd "${DRONE_WORKSPACE:-/drone/src}"
      - cp -rf infra /srv/volumes/deployment

      # Deploy the new environment (Compose V2 plugin)
      - docker compose -f config/compose/docker-compose.infra.yaml -p acovado-infra up -d
      - docker compose -f config/compose/docker-compose.apps.yaml -p acovado-apps up -d --force-recreate
    depends_on:
      - post-build

  ##############################################################################
  # Step 7: Cleanup Old Images
  ##############################################################################
  - name: cleanup
    image: docker
    environment:
      REGISTRY_URL: ${REGISTRY_URL}
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
    commands:
      - |
        docker images --format "{{.Repository}}:{{.Tag}}" | grep "${REGISTRY_URL}" | while read image; do
          if ! docker ps --filter "ancestor=$image" --format "{{.Image}}" | grep -q "$image"; then
            docker rmi -f $image || true;
          fi;
        done
    depends_on:
      - deploy

trigger:
  branch:
    - main
  event:
    - push
